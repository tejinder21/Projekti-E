<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>TicketGuru - Lipunmyynti</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        select, input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #2c7be5;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a68d1;
        }

        pre {
            background: #f1f3f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .result-title {
            margin-top: 20px;
            font-weight: bold;
        }

        .summary {
            margin-top: 15px;
            padding: 12px;
            background: #eef4ff;
            border-radius: 6px;
            border: 1px solid #c9ddff;
            font-weight: bold;
            color: #1f3f75;
        }
    </style>
</head>
<body>

    <button onclick="logout()">Kirjaudu ulos</button>

<div id="adminPanel" style="display:none; margin-top:30px;">
    <h2>Admin-toiminnot</h2>

    <label for="newUsername">Uusi käyttäjätunnus</label>
    <input id="newUsername" type="text">

    <label for="newPassword">Salasana</label>
    <input id="newPassword" type="password">

    <label for="newRole">Rooli</label>
    <select id="newRole">
        <option value="ADMIN">ADMIN</option>
        <option value="LIPUNMYYJÄ">LIPUNMYYJÄ</option>
        <option value="OVITARKASTAJA">OVITARKASTAJA</option>
    </select>

    <button onclick="createUser()">Luo käyttäjä</button>
</div>

<div class="container">
    <h2>🎟️ TicketGuru Lipunmyynti</h2>

    <label for="seller">Myyjä</label>
    <select id="seller"></select>

    <label for="event">Tapahtuma</label>
    <select id="event" onchange="updateTicketTypes()"></select>

    <label for="ticketType">Lipputyyppi</label>
    <select id="ticketType"></select>

    <label for="quantity">Määrä</label>
    <input id="quantity" type="number" min="1" value="1">

    <button onclick="createSale()">Myy liput</button>

    <div class="result-title">Yhteenveto:</div>
    <div id="saleSummary" class="summary">Ei vielä myyntiä.</div>

    <div class="result-title">Tulos:</div>
    <pre id="result"></pre>
</div>

<script>
    const token = localStorage.getItem("auth");
    const loggedUsername = localStorage.getItem("username");

    if (!token) {
        window.location.href = "/login.html";
    }

    const basicAuth = "Basic " + token;
    const BASE_URL = "/api";

    let eventsData = [];

    window.onload = function () {
        loadCurrentUser();
        loadUsers();
        loadEvents();
    };

    function getHeaders() {
        return {
            "Content-Type": "application/json",
            "Authorization": basicAuth
        };
    }

    function logout() {
        localStorage.removeItem("auth");
        localStorage.removeItem("username");
        window.location.href = "/login.html";
    }

    function loadCurrentUser() {
        fetch(`${BASE_URL}/users`, {
            headers: { "Authorization": basicAuth }
        })
        .then(response => response.json())
        .then(users => {
            const currentUser = users.find(user => user.username === loggedUsername);

            if (currentUser && currentUser.role === "ADMIN") {
                document.getElementById("adminPanel").style.display = "block";
            }
        })
        .catch(error => {
            console.error("Käyttäjän roolin haku epäonnistui:", error);
        });
    }

    function loadUsers() {
        fetch(`${BASE_URL}/users`, {
            headers: { "Authorization": basicAuth }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Käyttäjien haku epäonnistui: " + response.status);
            }
            return response.json();
        })
        .then(users => {
            const sellerSelect = document.getElementById("seller");
            sellerSelect.innerHTML = "";

            users.forEach(user => {
                const option = document.createElement("option");
                option.value = user.id;
                option.textContent = `${user.username} (${user.role})`;
                sellerSelect.appendChild(option);
            });
        })
        .catch(error => {
            document.getElementById("result").textContent =
                "Virhe käyttäjien haussa: " + error.message;
        });
    }

    function loadEvents() {
        fetch(`${BASE_URL}/events`, {
            headers: { "Authorization": basicAuth }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Tapahtumien haku epäonnistui: " + response.status);
            }
            return response.json();
        })
        .then(events => {
            eventsData = events;
            const eventSelect = document.getElementById("event");
            eventSelect.innerHTML = "";

            events.forEach(event => {
                const option = document.createElement("option");
                option.value = event.id;
                option.textContent = `${event.name} - ${event.city}`;
                eventSelect.appendChild(option);
            });

            updateTicketTypes();
        })
        .catch(error => {
            document.getElementById("result").textContent =
                "Virhe tapahtumien haussa: " + error.message;
        });
    }

    function updateTicketTypes() {
        const eventId = parseInt(document.getElementById("event").value);
        const ticketTypeSelect = document.getElementById("ticketType");
        ticketTypeSelect.innerHTML = "";

        const selectedEvent = eventsData.find(event => event.id === eventId);

        if (!selectedEvent || !selectedEvent.ticketTypes) {
            return;
        }

        selectedEvent.ticketTypes.forEach(ticketType => {
            const option = document.createElement("option");
            option.value = ticketType.id;
            option.textContent = `${ticketType.description} - ${ticketType.price} €`;
            ticketTypeSelect.appendChild(option);
        });
    }

    function createSale() {
        const sellerId = parseInt(document.getElementById("seller").value);
        const eventId = parseInt(document.getElementById("event").value);
        const ticketTypeId = parseInt(document.getElementById("ticketType").value);
        const quantity = parseInt(document.getElementById("quantity").value);

        if (!sellerId || !eventId || !ticketTypeId || quantity < 1) {
            alert("Tarkista syötetyt tiedot.");
            return;
        }

        const selectedEvent = eventsData.find(event => event.id === eventId);
        const selectedTicketType = selectedEvent.ticketTypes.find(tt => tt.id === ticketTypeId);

        const lineTotal = Number(selectedTicketType.price) * quantity;

        const saleData = {
            sellerId: sellerId,
            eventId: eventId,
            items: [
                {
                    ticketTypeId: ticketTypeId,
                    quantity: quantity
                }
            ]
        };

        fetch(`${BASE_URL}/sales`, {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify(saleData)
        })
        .then(async response => {
            const responseText = await response.text();

            if (!response.ok) {
                throw new Error("Myynti epäonnistui: " + response.status + " " + responseText);
            }

            return JSON.parse(responseText);
        })
        .then(data => {
            document.getElementById("saleSummary").textContent =
                `Myyty ${quantity} x ${selectedTicketType.description}, yhteensä ${lineTotal} € tapahtumaan "${selectedEvent.name}".`;

            document.getElementById("result").textContent =
                JSON.stringify(data, null, 2);
        })
        .catch(error => {
            document.getElementById("saleSummary").textContent = "Myynti ei onnistunut.";
            document.getElementById("result").textContent =
                "Virhe myynnissä: " + error.message;
        });
    }

    function createUser() {
        const username = document.getElementById("newUsername").value;
        const password = document.getElementById("newPassword").value;
        const role = document.getElementById("newRole").value;

        if (!username || !password || !role) {
            alert("Täytä kaikki käyttäjän tiedot.");
            return;
        }

        const userData = {
            username: username,
            password: password,
            role: role
        };

        fetch(`${BASE_URL}/users`, {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify(userData)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Käyttäjän luonti epäonnistui: " + response.status);
            }

            alert("Käyttäjä luotu!");
            loadUsers();
        })
        .catch(error => {
            alert("Virhe käyttäjän luonnissa.");
            console.error(error);
        });
    }
</script>

</body>
</html>
